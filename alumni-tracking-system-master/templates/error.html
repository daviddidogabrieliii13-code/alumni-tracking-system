{% extends "base.html" %}

{% block title %}Error {{ error_code }} - WVSU Alumni System{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card" style="text-align: center;">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h2>{{ error_code }}</h2>
                <p>{{ message }}</p>
            </div>
            
            <div class="auth-body">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
