{% extends "base.html" %}

{% block title %}Login - WVSU Alumni System{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon" style="width: 60px; height: 60px; margin: 0 auto var(--space-md);">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h2>Portal Sign In</h2>
                <p>Access the right portal for your role</p>
                <div class="portal-chips">
                    <span class="portal-chip" data-accent="alumni">Alumni</span>
                    <span class="portal-chip" data-accent="admin">Admin</span>
                    <span class="portal-chip" data-accent="director">Director</span>
                    <span class="portal-chip" data-accent="registrar">Registrar</span>
                    <span class="portal-chip" data-accent="osa">OSA</span>
                </div>
            </div>
            
            <div class="auth-body">
                <form method="POST">
                    <div class="form-group">
                        <label class="form-label required">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@wvsu.edu.ph" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label required">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="admin123" required>
                    </div>
                    
                    <div class="auth-form-options mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                
                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <div class="social-auth">
                    <button class="social-auth-btn" onclick="window.location.href='{{ url_for('register') }}'">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
            </div>
            
            <div class="auth-footer">
                <p>New alumni? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
