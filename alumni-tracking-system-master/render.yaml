services:
  - type: web
    name: wvsu-alumni-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SHOW_OTP_IN_UI 
        value: false
    plan: free
